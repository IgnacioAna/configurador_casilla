<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurador de Casillas Rurales Impacar</title>
    <meta
      name="description"
      content="Configure su casilla rural a medida y vea el plano en planta en vivo. Reciba el presupuesto estimado al instante."
    />

    <!-- Open Graph / WhatsApp / Facebook: tarjeta de vista previa del enlace compartido.
         IMPORTANTE (pre-go-live): og:url y og:image DEBEN ser URLs ABSOLUTAS para que WhatsApp
         muestre la imagen. Tras el deploy en Vercel, reemplazar el dominio de abajo por el real
         (ej. https://configurador-casilla.vercel.app). El título y la descripción ya funcionan aun
         si el dominio no coincide; solo la imagen depende de que la URL absoluta sea correcta. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Impacar" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:title" content="Configurador de Casillas Rurales Impacar" />
    <meta
      property="og:description"
      content="Arme su casilla a medida y vea el plano en planta en vivo. Presupuesto estimado al instante."
    />
    <meta property="og:url" content="https://configurador-casilla.vercel.app/" />
    <meta property="og:image" content="https://configurador-casilla.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Configurador de Casillas Rurales Impacar" />
    <meta
      name="twitter:description"
      content="Arme su casilla a medida y vea el plano en planta en vivo."
    />
    <meta name="twitter:image" content="https://configurador-casilla.vercel.app/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
